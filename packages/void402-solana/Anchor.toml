[toolchain]
anchor_version = "0.32.1"

[features]
resolution = true
skip-lint = false

[programs.devnet]
void_facilitator = "4pg7ro6Ds64oFajymEEhTRFA6sEqghrMmhRgUcmoj1cu"

[programs.mainnet]
void_facilitator = "EG7FU4WbrFJHbtW2L6zNxm5Zjz2dbzxQ68TQQSyjLaAf"

[registry]
url = "https://api.apr.dev"

[provider]
