[package]
name = "void-token"
version = "0.1.0"
description = "Void402 Encrypted SPL Token Program with Arcium MPC"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "void_token"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = []

[dependencies]
anchor-lang = "0.32.1"
anchor-spl = "0.32.1"
# Note: void-token program is deprecated - we use Token-2022 directly
# This program is kept for reference but not used in production

